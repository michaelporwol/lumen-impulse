name: Generate Daily Gospel

# Erzeugt täglich das Tagesevangelium (Referenz + Bibeltext) aus öffentlichen
# Quellen (Evangelizo/USCCB/Bolls). KEINE KI — Grundlage für die TTS-Audio-Generierung.
# (Magisterium-AI-Reflexion am 01.06.2026 entfernt.)

on:
  schedule:
    # Primary: 23:01 UTC = 00:01 CET (generate for next CET day)
    - cron: '1 23 * * *'
    # Backup: 04:30 UTC = 05:30 CET (catch up if primary was skipped by GitHub)
    - cron: '30 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Check if today's gospel already exists AND is valid
        id: check
        run: |
          TODAY=$(TZ=Europe/Berlin date +%Y-%m-%d)
          F="impulses/${TODAY}.json"
          # Nur überspringen, wenn die Datei existiert UND gültige gospelTexts hat.
          # Eine kaputte null-Datei (z. B. nach transientem Quellenausfall) darf den
          # Backup-Lauf NICHT blockieren — sonst keine Selbstheilung (Vorfall 17.06.2026).
          if [ -f "$F" ] && python3 -c "import json,sys; d=json.load(open('$F')); gt=d.get('gospelTexts') or {}; sys.exit(0 if (gt.get('de') or {}).get('text') else 1)"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Gospel for ${TODAY} already complete — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Generating gospel for ${TODAY} (fehlt oder gospelTexts leer)..."
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: 20

      - name: Generate daily gospel (no AI)
        if: steps.check.outputs.skip != 'true'
        run: node scripts/generate-impulse.js

      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add impulses/
          git diff --cached --quiet || git commit -m "gospel: $(date -u +%Y-%m-%d)"
          git push
